<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support | MMJ Online</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu{
position:relative;
}

.dots{
font-size:26px;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
right:0;
top:35px;
background:#1e293b;
padding:15px;
border-radius:8px;
width:170px;
}

.dropdown a{
display:block;
padding:8px;
text-decoration:none;
color:white;
}

.dropdown a:hover{
background:#334155;
border-radius:5px;
}

/* HERO */

.hero{
height:35vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#22c55e,#1e293b);
}

/* SUPPORT */

.support{
padding:60px 20px;
text-align:center;
}

.form-box{
max-width:900px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:10px;
}

/* GOOGLE FORM */

iframe{
width:100%;
height:700px;
border:none;
border-radius:8px;
}

/* FOOTER */

footer{
background:#020617;
padding:20px;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">MMJ Online</div>

<div class="menu">
<div class="dots" onclick="toggleMenu()">⋮</div>

<div class="dropdown" id="menu">
<a href="index.html">Home</a>
<a href="bio.html">Bio</a>
<a href="skills.html">Skills</a>
<a href="minecraft.html">Minecraft Mods</a>
<a href="support.html">Support</a>
</div>

</div>

</header>


<section class="hero">
<div>
<h1>Support Center</h1>
<p>Need help? Send us a request below</p>
</div>
</section>


<section class="support">

<div class="form-box">

<h2>Submit a Support Request</h2>
<p>Please fill out the form and we will respond soon.</p>

<br>

<iframe src="https://forms.gle/bGd5W95L3q4UXmbBA"></iframe>

</div>

</section>


<footer>
<p>© 2026 MMJ Online | Powered by GitHub Pages</p>
</footer>


<script>
function toggleMenu(){
var menu=document.getElementById("menu");
if(menu.style.display=="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}
}
</script>

</body>
</html>
