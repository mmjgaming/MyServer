<!DOCTYPE html>
<html lang="en">
<head>
    <title>MMJ Online - Dashboard</title>
    <meta name="description" content="User Dashboard for MMJ Online.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>

    /* --- CSS VARIABLES & RESET (Same as Index) --- */
    :root {
        --bg-dark: #0f172a;
        --bg-card: #1e293b;
        --bg-header: rgba(2, 6, 23, 0.95);
        --primary: #0ea5e9;
        --primary-hover: #0284c7;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border: #334155;
        --success: #22c55e;
        --discord: #5865F2;
    }

    * {
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
    }

    body{
        background:var(--bg-dark);
        color:var(--text-main);
        line-height: 1.6;
        min-height: 100vh;
    }

    /* --- HEADER --- */
    header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 40px;
        background:var(--bg-header);
        backdrop-filter: blur(10px);
        position:sticky;
        top:0;
        z-index:1000;
        border-bottom: 1px solid var(--border);
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .logo{
        font-size:24px;
        font-weight:800;
        letter-spacing: -0.5px;
        color: white;
        text-decoration: none;
    }

    .menu{
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .dots{
        font-size:26px;
        cursor:pointer;
        padding: 5px;
        transition: 0.2s;
    }
    .dots:hover { color: var(--primary); }

    .dropdown{
        display:none;
        position:absolute;
        right:40px;
        top:60px;
        background:var(--bg-card);
        padding:10px;
        border-radius:12px;
        width:180px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        border: 1px solid var(--border);
        animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .dropdown a{
        display:block;
        padding:12px;
        text-decoration:none;
        color:var(--text-muted);
        border-radius:8px;
        font-weight: 500;
        transition: 0.2s;
    }

    .dropdown a:hover{
        background:var(--border);
        color: white;
    }

    /* --- DASHBOARD LAYOUT --- */
    .container {
        max-width: 1000px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .dashboard-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .dashboard-header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    .profile-card {
        background: var(--bg-card);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid var(--border);
        text-align: center;
        margin-bottom: 30px;
    }

    .avatar {
        width: 80px;
        height: 80px;
        background: var(--primary);
        color: white;
        font-size: 32px;
        font-weight: bold;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px auto;
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .stat-box {
        background: rgba(15, 23, 42, 0.5);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid var(--border);
    }

    .stat-box h3 {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 5px;
    }

    .stat-box p {
        font-size: 1.5rem;
        font-weight: bold;
        color: white;
    }

    /* --- BUTTONS --- */
    .btn {
        display:inline-block;
        padding:10px 24px;
        background:var(--primary);
        border-radius:8px;
        text-decoration:none;
        color:white;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: 0.2s;
    }
    .btn:hover { background: var(--primary-hover); }

    .btn-danger {
        background: #ef4444;
    }
    .btn-danger:hover { background: #dc2626; }

    .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-main);
    }
    .btn-outline:hover { background: var(--border); }

    /* --- FOOTER --- */
    footer{
        background:#020617;
        padding:40px;
        text-align:center;
        margin-top:80px;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
    }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="logo">MMJ Online</a>

        <div class="menu">
            <!-- Dashboard Specific Nav -->
            <button id="navLogoutBtn" class="btn btn-danger" onclick="handleLogout()">Logout</button>
            
            <div class="dots" onclick="toggleMenu()">⋮</div>
            
            <div class="dropdown" id="menu">
                <a href="index.html">Home</a>
                <a href="bio.html">Bio</a>
                <a href="skills.html">Skills</a>
                <a href="minecraft.html">Minecraft Mods</a>
                <a href="support.html">Support</a>
            </div>
        </div>
    </header>

    <div class="container">
        
        <div class="dashboard-header">
            <h1>Dashboard</h1>
            <p style="color: var(--text-muted);">Manage your account and preferences.</p>
        </div>

        <!-- Profile Section -->
        <div class="profile-card">
            <div class="avatar" id="userAvatar">U</div>
            <h2 id="userName">Loading...</h2>
            <p id="userEmail" style="color: var(--primary); font-size: 1.1rem; margin-bottom: 20px;">...</p>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-outline" onclick="alert('Change Password functionality coming soon!')">Change Password</button>
                <button class="btn btn-danger" onclick="handleLogout()">Sign Out</button>
            </div>
        </div>

        <!-- Stats / Info Grid -->
        <div class="stats-grid">
            <div class="stat-box">
                <h3>Status</h3>
                <p style="color: var(--success);">Active</p>
            </div>
            <div class="stat-box">
                <h3>Role</h3>
                <p>Member</p>
            </div>
            <div class="stat-box">
                <h3>Joined</h3>
                <p id="joinedDate">Just now</p>
            </div>
        </div>

    </div>

    <footer>
        <p>© 2026 MMJ Online | Powered by MMJ Pages</p>
    </footer>

    <script>
        // --- 1. SUPABASE CONFIGURATION ---
        const SUPABASE_URL = 'https://pyndjzoiojdtxzeeccoz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5bmRqem9pb2pkdHh6ZWVjY296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODg0MjUsImV4cCI6MjA5MzU2NDQyNX0.6tH0mj_KPQDcIcIfStcsuT89kPuX1ZFVCzB2pBt03c0';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. PROTECTED ROUTE LOGIC ---
        window.addEventListener('load', async () => {
            // Check if user is logged in
            const { data: { session } } = await _supabase.auth.getSession();

            if (!session) {
                // NOT LOGGED IN: Redirect to Home
                window.location.href = 'index.html';
            } else {
                // LOGGED IN: Show Data
                loadUserData(session);
            }
        });

        function loadUserData(session) {
            const email = session.user.email;
            const createdAt = new Date(session.user.created_at).toLocaleDateString();

            // Update HTML elements
            document.getElementById('userEmail').textContent = email;
            document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase();
            document.getElementById('userName').textContent = "Welcome back";
            document.getElementById('joinedDate').textContent = createdAt;
        }

        // --- 3. LOGOUT ---
        async function handleLogout() {
            const { error } = await _supabase.auth.signOut();
            if (!error) {
                window.location.href = 'index.html'; // Redirect to home after logout
            }
        }

        // --- 4. MENU TOGGLE ---
        function toggleMenu() {
            var menu = document.getElementById("menu");
            menu.style.display = (menu.style.display == "block") ? "none" : "block";
        }
    </script>
</body>
</html>
